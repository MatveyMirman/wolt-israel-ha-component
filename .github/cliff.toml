[changelog]
# Body template - no version header, just grouped commits
body = """
{% for group, commits in commits | group_by(attribute="group") %}\
### {\
  group \
}
{% for commit in commits %}\
- {\
  if commit.scope\
}**{commit.scope}:** {\
  commit.message \
}{% else %}\
{\
  commit.message \
}{% endif %} ({\
  commit.id \
})\
{% endfor %}\
{% endfor %}\
"""
# Remove commit messages for categories that don't have meaningful changes
trim = true
# Add commits to the changelog
postprocess = []
# Changelog footer
footer = """
<!-- generated by git-cliff -->
"""

[git]
# Conventional commits parsing
conventional_commits = true
# Tag pattern
tag_pattern = "v[0-9].*"
# Regex to parse the tag
parse_tag = "v(?P<major>\\d+)\\.(?P<minor>\\d+)\\.(?P<patch>\\d+)(?P<prerelease>.+)?"
# Feature path
commit_prepend_subject = false
# Sort the commits inside sections
split_commits_footers = false
# Protect sections from being empty
protect_footers = true
# Remove the heading from the commit message
conventional = true

[git.commit_parsers]
# Conventional commits parser configuration
conventional = true

[[git.commit_parsers]]
# Features
parser = "feat(?:ure)?(?:s)?(?:\(.+\))?:"
group = "Added"
default_scope = ""

[[git.commit_parsers]]
# Bug fixes
parser = "fix(?:\(.+\))?:"
group = "Fixed"

[[git.commit_parsers]]
# Performance improvements
parser = "perf(?:\(.+\))?:"
group = "Changed"

[[git.commit_parsers]]
# Refactoring
parser = "refactor(?:\(.+\))?:"
group = "Changed"

[[git.commit_parsers]]
# Documentation changes
parser = "docs?(?:\(.+\))?:"
group = "Changed"

[[git.commit_parsers]]
# Style changes
parser = "style(?:\(.+\))?:"
group = "Changed"

[[git.commit_parsers]]
# Test changes
parser = "test(?:s)?(?:\(.+\))?:"
group = "Changed"

[[git.commit_parsers]]
# Build/CI changes
parser = "build(?:\(.+\))?:"
group = "Changed"

[[git.commit_parsers]]
# Continuous Integration changes
parser = "ci(?:\(.+\))?:"
group = "Changed"

[[git.commit_parsers]]
# Chore/maintenance
parser = "chore(?:\(.+\))?:"
group = "Changed"

[[git.commit_parsers]]
# Reverts
parser = "revert(?:\(.+\))?:"
group = "Reverted"

[[git.commit_parsers]]
# Deprecations
parser = "deprecat(?:e|ion)(?:\(.+\))?:"
group = "Deprecated"

[[git.commit_parsers]]
# Security fixes
parser = "security(?:\(.+\))?:"
group = "Security"

[[git.commit_parsers]]
# Breaking changes
parser = ".*"
skip = "^feat!:|^fix!:|^refactor!:|^ BREAKING"
message = "Breaking Changes"
group = "Breaking"

[git.commit_parsers conventional]
# Enable conventional commits parsing
enabled = true

[git.rerollup]
# Include merge commits
merges = true
# Include all commits
all = false

[git.strip]
# Strip sections from the commit message
sections = []

[gitlab]
# GitLab configuration
remote = "origin"
# Ignore commit authors
ignore_authors = []
# Groups to ignore
ignore_groups = []

[github]
# GitHub configuration
remote = "origin"
# Ignore commit authors
ignore_authors = []
# Groups to ignore
ignore_groups = []

[bitbucket]
# Bitbucket configuration
remote = "origin"
# Ignore commit authors
ignore_authors = []
# Groups to ignore
ignore_groups = []

[top_level]
# Keep changelog sections sorted
sortmsg = "Changelog"

[breaking_commits]
# Treat conventional commits as breaking changes
conventional = true
# Patterns to identify breaking changes
patterns = ["BREAKING", "breaking"]
# Message format for breaking changes
message = "**Breaking Changes**"
